<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Pong — Neon Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060a14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: min(95vw, calc(95vh * 1.6));
  }

  canvas {
    display: block;
    width: 100%;
    border-radius: 14px;
    border: 1.5px solid rgba(0,255,204,0.18);
    box-shadow: 0 0 60px rgba(0,255,204,0.08), 0 0 120px rgba(0,0,0,0.8);
    cursor: none;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    background: rgba(6,10,20,0.88);
    backdrop-filter: blur(6px);
    transition: opacity 0.3s;
  }

  .overlay-title {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 700;
    letter-spacing: 6px;
    color: #00ffcc;
    text-shadow: 0 0 30px #00ffcc88, 0 0 60px #00ffcc44;
    margin-bottom: 6px;
  }

  .overlay-sub {
    font-size: clamp(11px, 1.8vw, 14px);
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 36px;
  }

  .overlay-info {
    font-size: clamp(11px, 1.6vw, 13px);
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 2.2;
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .overlay-info span { color: #00ffcc; font-weight: 700; }

  .btn {
    background: transparent;
    border: 2px solid #00ffcc;
    color: #00ffcc;
    padding: 13px 44px;
    font-size: clamp(12px, 2vw, 15px);
    letter-spacing: 4px;
    cursor: pointer;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 10px #00ffcc66;
    transition: all 0.2s;
    margin: 6px;
  }

  .btn:hover {
    background: rgba(0,255,204,0.12);
    box-shadow: 0 0 24px rgba(0,255,204,0.3);
    transform: translateY(-1px);
  }

  .btn:active { transform: scale(0.97); }

  .btn.danger {
    border-color: #ff4466;
    color: #ff4466;
    text-shadow: 0 0 10px #ff446666;
  }

  .btn.danger:hover {
    background: rgba(255,68,102,0.12);
    box-shadow: 0 0 24px rgba(255,68,102,0.3);
  }

  .difficulty-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .diff-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.5);
    padding: 8px 20px;
    font-size: clamp(10px, 1.5vw, 12px);
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    transition: all 0.2s;
  }

  .diff-btn.active {
    border-color: #00ffcc;
    color: #00ffcc;
    background: rgba(0,255,204,0.08);
  }

  .score-display {
    font-size: clamp(20px, 4vw, 38px);
    font-weight: 700;
    color: rgba(0,255,204,0.8);
    letter-spacing: 8px;
    margin-bottom: 10px;
  }

  #hud {
    position: absolute;
    top: 10px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    pointer-events: none;
  }

  .hud-btn {
    pointer-events: all;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    padding: 5px 12px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    transition: all 0.2s;
  }

  .hud-btn:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

  #sound-toggle { font-size: 16px; border: none; padding: 4px 8px; }

  @media (max-width: 480px) {
    .difficulty-row { gap: 6px; }
    .diff-btn { padding: 6px 12px; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="c"></canvas>

  <div id="hud" style="display:none;">
    <button class="hud-btn" id="pauseBtn" onclick="togglePause()">PAUSE</button>
    <button class="hud-btn" id="sound-toggle" onclick="toggleSound()">🔊</button>
    <button class="hud-btn" onclick="showMenu()">MENU</button>
  </div>

  <div id="overlay">
    <div class="overlay-title">PING PONG</div>
    <div class="overlay-sub">NEON EDITION</div>
    <div class="overlay-info">
      Move your <span>mouse</span> or <span>touch</span> to control<br>
      First to <span>11</span> points wins the set
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-bottom:12px;">DIFFICULTY</div>
    <div class="difficulty-row">
      <button class="diff-btn" onclick="setDiff('easy',this)">EASY</button>
      <button class="diff-btn active" onclick="setDiff('medium',this)">MEDIUM</button>
      <button class="diff-btn" onclick="setDiff('hard',this)">HARD</button>
    </div>
    <button class="btn" onclick="startGame()">START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const hud = document.getElementById('hud');
const pauseBtn = document.getElementById('pauseBtn');
const soundBtn = document.getElementById('sound-toggle');

let W, H, PAD_H, BALL_R;
let running = false, paused = false, soundOn = true;
let score = {p:0, ai:0};
let particles = [], flashTimer = 0;
let difficulty = 'medium';
let animId;

const diffSettings = {
  easy:   { speed: 0.65, reaction: 0.55, error: 14 },
  medium: { speed: 0.82, reaction: 0.70, error: 7  },
  hard:   { speed: 0.95, reaction: 0.90, error: 2  },
};

const PAD_W_RATIO = 0.018;
let PAD_W;
const WIN_SCORE = 11;

let player = {x:0, y:0};
let ai = {x:0, y:0};
let ball = {x:0, y:0, vx:0, vy:0, trail:[]};
let mouseY = 0;
let rallyCount = 0;

// Audio context
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq=440, dur=0.06, type='square', vol=0.15) {
  if (!soundOn) return;
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(); osc.stop(ac.currentTime + dur);
  } catch(e){}
}

function setDiff(d, el) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function toggleSound() {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
}

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
  if (!paused) loop();
}

function showMenu() {
  running = false; paused = false;
  cancelAnimationFrame(animId);
  hud.style.display = 'none';
  overlay.innerHTML = `
    <div class="overlay-title">PING PONG</div>
    <div class="overlay-sub">NEON EDITION</div>
    <div class="overlay-info">Move your <span>mouse</span> or <span>touch</span> to control<br>First to <span>11</span> points wins the set</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-bottom:12px;">DIFFICULTY</div>
    <div class="difficulty-row">
      <button class="diff-btn ${difficulty==='easy'?'active':''}" onclick="setDiff('easy',this)">EASY</button>
      <button class="diff-btn ${difficulty==='medium'?'active':''}" onclick="setDiff('medium',this)">MEDIUM</button>
      <button class="diff-btn ${difficulty==='hard'?'active':''}" onclick="setDiff('hard',this)">HARD</button>
    </div>
    <button class="btn" onclick="startGame()">START GAME</button>
  `;
  overlay.style.display = 'flex';
}

function resize() {
  const wrapper = document.getElementById('game-wrapper');
  const rect = wrapper.getBoundingClientRect();
  W = canvas.width = Math.round(rect.width);
  H = canvas.height = Math.round(W * 0.58);
  canvas.style.height = H + 'px';
  PAD_W = Math.max(10, Math.round(W * PAD_W_RATIO));
  PAD_H = Math.round(H * 0.14);
  BALL_R = Math.max(6, Math.round(W * 0.012));
  player.x = Math.round(W * 0.032);
  ai.x = W - Math.round(W * 0.032) - PAD_W;
  if (!running) {
    player.y = H/2 - PAD_H/2;
    ai.y = H/2 - PAD_H/2;
    ball.x = W/2; ball.y = H/2;
  }
}

function resetBall(dir = 1) {
  ball.x = W/2; ball.y = H/2;
  const angle = (Math.random() * 0.5 - 0.25);
  const spd = Math.min(W, H) * 0.011;
  ball.vx = dir * spd * Math.cos(angle);
  ball.vy = spd * Math.sin(angle);
  ball.trail = [];
  rallyCount = 0;
}

function spawnParticles(x, y, color, count=16) {
  for (let i=0; i<count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.5 + Math.random() * 4;
    particles.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life:1, color, r: 2+Math.random()*2});
  }
}

function drawBg() {
  ctx.fillStyle = '#070c18';
  ctx.fillRect(0,0,W,H);

  // Grid lines subtle
  ctx.strokeStyle = 'rgba(0,255,204,0.04)';
  ctx.lineWidth = 1;
  const step = Math.round(H/8);
  for (let y=step; y<H; y+=step) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Center dashed line
  ctx.setLineDash([8, 14]);
  ctx.strokeStyle = 'rgba(0,255,204,0.15)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  // Net dots
  const dotH = 10, gap = 20;
  ctx.fillStyle = 'rgba(0,255,204,0.06)';
  for (let y=0; y<H; y+=dotH+gap) {
    ctx.fillRect(W/2-1, y, 2, dotH);
  }

  // Court border glow
  if (flashTimer > 0) {
    ctx.strokeStyle = `rgba(255,255,100,${flashTimer * 0.5})`;
    flashTimer -= 0.08;
  } else {
    ctx.strokeStyle = 'rgba(0,255,204,0.2)';
  }
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, W-2, H-2);
}

function drawPaddle(x, y, color, glowColor) {
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 20;
  const grad = ctx.createLinearGradient(x, y, x+PAD_W, y+PAD_H);
  grad.addColorStop(0, color);
  grad.addColorStop(1, color + '99');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x, y, PAD_W, PAD_H, 4);
  ctx.fill();
  // Highlight strip
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(x+1, y+2, PAD_W-2, PAD_H*0.25, 3);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBall() {
  // Trail
  for (let i=0; i<ball.trail.length; i++) {
    const t = ball.trail[i];
    const pct = i / ball.trail.length;
    ctx.beginPath();
    ctx.arc(t.x, t.y, BALL_R * pct * 0.75, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,255,204,${pct * 0.35})`;
    ctx.fill();
  }
  // Ball glow
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 28;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
  ctx.fill();
  // Inner shine
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(200,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(ball.x - BALL_R*0.28, ball.y - BALL_R*0.28, BALL_R*0.38, 0, Math.PI*2);
  ctx.fill();
}

function drawScore() {
  const fs = Math.round(H * 0.11);
  ctx.font = `700 ${fs}px 'Courier New'`;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 20;
  ctx.fillStyle = 'rgba(0,255,204,0.75)';
  ctx.fillText(score.p, W*0.25, H*0.14);
  ctx.fillText(score.ai, W*0.75, H*0.14);
  ctx.shadowBlur = 0;
  ctx.font = `${Math.round(H*0.038)}px 'Courier New'`;
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fillText('YOU', W*0.25, H*0.215);
  ctx.fillText('AI', W*0.75, H*0.215);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life * p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPausedOverlay() {
  ctx.fillStyle = 'rgba(6,10,20,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `700 ${Math.round(H*0.08)}px 'Courier New'`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,255,204,0.9)';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 20;
  ctx.fillText('PAUSED', W/2, H/2);
  ctx.shadowBlur = 0;
}

function update() {
  if (paused) return;

  ball.trail.push({x:ball.x, y:ball.y});
  if (ball.trail.length > 12) ball.trail.shift();

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce
  if (ball.y - BALL_R < 0) {
    ball.y = BALL_R; ball.vy = Math.abs(ball.vy);
    spawnParticles(ball.x, 0, '#00ffcc88', 8);
    beep(300, 0.05, 'sine', 0.08);
  }
  if (ball.y + BALL_R > H) {
    ball.y = H - BALL_R; ball.vy = -Math.abs(ball.vy);
    spawnParticles(ball.x, H, '#00ffcc88', 8);
    beep(300, 0.05, 'sine', 0.08);
  }

  // Player paddle hit
  if (ball.vx < 0 &&
      ball.x - BALL_R < player.x + PAD_W &&
      ball.x + BALL_R > player.x &&
      ball.y > player.y - BALL_R &&
      ball.y < player.y + PAD_H + BALL_R) {
    const rel = (ball.y - (player.y + PAD_H/2)) / (PAD_H/2);
    const angle = rel * 0.85;
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) * 1.04;
    ball.vx = Math.abs(spd * Math.cos(angle));
    ball.vy = spd * Math.sin(angle);
    ball.x = player.x + PAD_W + BALL_R;
    rallyCount++;
    spawnParticles(ball.x, ball.y, '#00aaff', 18);
    beep(520 + rallyCount*10, 0.07, 'square', 0.12);
    flashTimer = 0.3;
  }

  // AI paddle hit
  if (ball.vx > 0 &&
      ball.x + BALL_R > ai.x &&
      ball.x - BALL_R < ai.x + PAD_W &&
      ball.y > ai.y - BALL_R &&
      ball.y < ai.y + PAD_H + BALL_R) {
    const rel = (ball.y - (ai.y + PAD_H/2)) / (PAD_H/2);
    const angle = rel * 0.85;
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) * 1.04;
    ball.vx = -Math.abs(spd * Math.cos(angle));
    ball.vy = spd * Math.sin(angle);
    ball.x = ai.x - BALL_R;
    rallyCount++;
    spawnParticles(ball.x, ball.y, '#ff4466', 18);
    beep(380, 0.07, 'square', 0.1);
    flashTimer = 0.3;
  }

  // Score points
  if (ball.x < -BALL_R) {
    score.ai++;
    beep(160, 0.3, 'sawtooth', 0.2);
    spawnParticles(0, H/2, '#ff4466', 30);
    if (score.ai >= WIN_SCORE) { endGame(false); return; }
    resetBall(1);
  }
  if (ball.x > W + BALL_R) {
    score.p++;
    beep(660, 0.2, 'sine', 0.18);
    spawnParticles(W, H/2, '#00ffcc', 30);
    if (score.p >= WIN_SCORE) { endGame(true); return; }
    resetBall(-1);
  }

  // Player movement (smooth follow mouse)
  const targetY = Math.max(0, Math.min(H - PAD_H, mouseY - PAD_H/2));
  player.y += (targetY - player.y) * 0.28;

  // AI movement
  const cfg = diffSettings[difficulty];
  const aiCenter = ai.y + PAD_H/2;
  const predictY = ball.y + (ball.vx > 0 ? (ai.x - ball.x) / ball.vx * ball.vy : 0);
  const target = ball.vx > 0
    ? predictY + (Math.random()-0.5) * cfg.error * 2
    : H/2;
  const diff = target - aiCenter;
  const maxSpd = Math.min(W,H) * 0.011 * cfg.speed;
  ai.y += Math.sign(diff) * Math.min(Math.abs(diff) * cfg.reaction, maxSpd);
  ai.y = Math.max(0, Math.min(H - PAD_H, ai.y));
}

function endGame(won) {
  running = false;
  cancelAnimationFrame(animId);
  hud.style.display = 'none';
  const color = won ? '#00ffcc' : '#ff4466';
  const glow = won ? '#00ffcc88' : '#ff446688';
  overlay.innerHTML = `
    <div class="overlay-title" style="color:${color};text-shadow:0 0 30px ${glow},0 0 60px ${glow}44;">${won ? 'YOU WIN!' : 'GAME OVER'}</div>
    <div class="overlay-sub">${won ? 'WELL PLAYED' : 'BETTER LUCK NEXT TIME'}</div>
    <div class="score-display" style="color:${color};">${score.p} — ${score.ai}</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-bottom:28px;">${rallyCount} TOTAL RALLIES</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <button class="btn" onclick="startGame()">PLAY AGAIN</button>
      <button class="btn" onclick="showMenu()">MENU</button>
    </div>
  `;
  overlay.style.display = 'flex';
}

function loop() {
  update();
  particles = particles.filter(p => p.life > 0.02);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life *= 0.87;
  });
  drawBg();
  drawScore();
  drawPaddle(player.x, player.y, '#00aaff', '#0088ff');
  drawPaddle(ai.x, ai.y, '#ff4466', '#ff2244');
  drawBall();
  drawParticles();
  if (paused) drawPausedOverlay();
  if (running) animId = requestAnimationFrame(loop);
}

function startGame() {
  score = {p:0, ai:0};
  particles = [];
  rallyCount = 0;
  overlay.style.display = 'none';
  hud.style.display = 'flex';
  pauseBtn.textContent = 'PAUSE';
  paused = false;
  running = true;
  resize();
  player.y = H/2 - PAD_H/2;
  ai.y = H/2 - PAD_H/2;
  mouseY = H/2;
  resetBall(Math.random() > 0.5 ? 1 : -1);
  loop();
}

// Input
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseY = (e.clientY - rect.top) * (H / rect.height);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseY = (e.touches[0].clientY - rect.top) * (H / rect.height);
}, {passive: false});
canvas.addEventListener('touchstart', e => {
  const rect = canvas.getBoundingClientRect();
  mouseY = (e.touches[0].clientY - rect.top) * (H / rect.height);
}, {passive: true});
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && running) { e.preventDefault(); togglePause(); }
  if (e.code === 'Escape' && running) showMenu();
});

window.addEventListener('resize', () => { resize(); });
resize();
drawBg();
drawPaddle(player.x, player.y, '#00aaff', '#0088ff');
drawPaddle(ai.x, ai.y, '#ff4466', '#ff2244');
drawBall();
</script>
</body>
</html>
